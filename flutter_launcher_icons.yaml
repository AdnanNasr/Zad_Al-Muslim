# flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/images/app_logo.png"

  android: true
  min_sdk_android: 21
  adaptive_icon_background: "assets/images/ic_launcher_background.png"
  adaptive_icon_foreground: "assets/images/ic_launcher_foreground.png"

  ios: true
  image_path_ios: "assets/images/app_logo_ios.png"
  remove_alpha_ios: true

  web:
    generate: true
    image_path: "assets/images/app_logo.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"

  windows:
    generate: true
    image_path: "assets/images/app_logo.png"
    icon_size: 48

  macos:
    generate: true
    image_path: "assets/images/app_logo.png"
